<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフライン - HikamersSearch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #e8eaed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #4285f4;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #9aa0a6;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background: #5a95f5;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>オフライン</h1>
        <p>インターネット接続が切断されています。<br>接続を確認してから、もう一度お試しください。</p>
        <button type="button" onclick="window.location.href='/'">ホームに戻る</button>
    </div>
</body>

</html>
